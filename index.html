<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>עיתים - מתכנן לימוד</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* --- SCREEN STYLES (Website) --- */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            background-color: #e5e7eb;
        }
    
        .calendar-day {
            min-height: 95px;
            background: white;
            padding: 4px;
            display: flex;
            flex-direction: column;
            transition: all 0.2s;
        }
    
        .calendar-day:hover {
            background-color: #f9fafb;
        }
    
        .holiday-bg {
            background-color: #fefce8;
            border: 1px solid #fef08a;
        }
    
        .shabbat-bg {
            background-color: #eff6ff;
        }
    
        .holiday-label-small {
            display: block;
            color: #b91c1c;
            font-size: 10px;
            font-weight: bold;
            margin-bottom: 2px;
        }
    
        .force-study {
            background-color: #f0f7ff !important;
            border: 2px solid #3b82f6 !important;
        }
    
        .force-break {
            background-color: #fef2f2 !important;
            border: 2px solid #ef4444 !important;
        }
    
        input:focus,
        select:focus {
            outline: none !important;
            border-color: #1e40af !important;
            box-shadow: 0 0 0 3px rgba(30, 64, 175, 0.1);
        }
    
        /* --- PRINT STYLES (Strictly for Paper/PDF) --- */
        @media print {
            @page {
                margin: 0;
                /* Let the container handle margins */
                size: auto;
            }
    
            .no-print {
                display: none !important;
            }
    
            html,
            body {
                margin: 0 !important;
                padding: 0 !important;
                background: white !important;
                height: auto !important;
            }
    
            /* 1. Force remove all shadows and spacing that causes overflow */
            * {
                box-shadow: none !important;
                text-shadow: none !important;
            }
    
            /* 2. Container setup */
            #calendarContainer {
                margin: 0 !important;
                padding: 0 !important;
                width: 100% !important;
            }
    
            /* 3. Each Month Page */
            .calendar-month {
                page-break-before: always;
                break-before: page;
                page-break-inside: avoid;
                break-inside: avoid;
    
                /* Centering Logic */
                display: flex !important;
                flex-direction: column !important;
                justify-content: center !important;
                align-items: center !important;
    
                /* Sizing */
                width: 100vw !important;
                height: 100vh !important;

                /* Forces each month to occupy the full page height */
                box-sizing: border-box !important;
                border: none !important;
                margin: 0 !important;

                /* Forces original background colors */
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
    
            /* Kill break for the first month to prevent initial blank page */
            .calendar-month:first-child {
                page-break-before: avoid;
                break-before: avoid;
            }
    
            /* 4. The actual calendar table/grid inside the month */
            .calendar-month>div {
                width: 92% !important;
                /* Leaves a small margin on sides */
                margin: 0 auto !important;
                /* Vertical Stretch: Slightly increase the size of the whole month */
                transform: scaleY(1.02);
                transform-origin: center;
            }
    
            /* 5. Stretch the days vertically */
            .calendar-day {
                min-height: 120px !important;
                border: 1px solid #e5e7eb !important;
                padding: 6px !important;
            }
        }

        /* MOBILE STYLES */
        @media (max-width: 768px) {
            /* 1. The Container: Allows horizontal "glide" */
            .calendar-scroll-container {
                width: 100% !important;
                overflow-x: auto !important;
                -webkit-overflow-scrolling: touch; /* Smooth momentum scroll for iOS */
                position: relative;
                padding-bottom: 8px; /* Space for the scrollbar */
            }

            /* 2. The Grid: Forced width to create the scroll and "peeking" effect */
            .calendar-grid {
                display: grid !important;
                grid-template-columns: repeat(7, 1fr) !important;
                /* 180% width ensures cells look like squares and 
                the edge of the table is visibly cut off as a scroll hint */
                min-width: 180% !important; 
                background-color: #e5e7eb;
                gap: 1px;
            }

            /* 3. The Cells: Forcing square shape and adjusting font sizes */
            .calendar-day {
                aspect-ratio: 1 / 1 !important; /* This makes them perfectly square */
                min-height: auto !important; 
                padding: 4px !important;
            }

            /* 4. Visual Hint: Style the scrollbar so it acts as a "rail" indicator */
            .calendar-scroll-container::-webkit-scrollbar {
                height: 5px;
                display: block !important;
            }

            .calendar-scroll-container::-webkit-scrollbar-track {
                background: #f1f5f9; /* slate-100 */
                border-radius: 10px;
            }

            .calendar-scroll-container::-webkit-scrollbar-thumb {
                background: #cbd5e1; /* slate-300 */
                border-radius: 10px;
            }

            /* 5. Cleanup: Ensure the main site doesn't wobble horizontally */
            body, html {
                overflow-x: hidden !important;
            }

            /* Smaller text for mobile content to fit the square cells */
            .calendar-day span, 
            .calendar-day div {
                font-size: 0.85em; 
                line-height: 1.1;
            }
        }

        /* --- PRINT STYLES --- */
        @media print {
            /* Keep your existing print logic here to ensure 
            it ignores the scroll-container width when on paper */
            .calendar-scroll-container {
                overflow: visible !important;
                width: 100% !important;
            }
            .calendar-grid {
                min-width: 100% !important;
                width: 100% !important;
            }
        }
    </style>
</head>

<body class="bg-slate-50 font-sans text-gray-900 p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <header class="text-center mb-10 no-print">
            <h1 class="text-5xl font-black text-slate-800 mb-3 tracking-tight">עיתים</h1>
            <p class="text-lg text-slate-500 font-medium">תכנון ובניית מסלולי לימוד תורה בהתאמה אישית</p>
        </header>

        <div class="bg-white rounded-2xl shadow-xl mb-8 no-print border border-slate-200 overflow-hidden">
            <!-- Header Accent -->
            <div class="h-2 bg-gradient-to-r from-blue-900 via-blue-700 to-blue-900"></div>

            <div class="p-6 md:p-8">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">

                    <!-- Right Column: Sequence Builder -->
                    <div class="space-y-6">
                        <div class="bg-slate-50 p-5 rounded-xl border border-slate-200">
                            <label class="block font-bold mb-3 text-slate-700 flex items-center gap-2">
                                הוספת מסכת למסלול
                            </label>
                            <div class="flex gap-2">
                                <select id="masechetSelect"
                                    class="flex-1 border border-slate-300 rounded-lg p-3 bg-white shadow-sm font-medium"></select>
                                <button onclick="addToSequence()"
                                    class="bg-blue-800 text-white px-5 rounded-lg font-bold hover:bg-blue-900 transition-all shadow-md active:scale-95 flex items-center gap-1">
                                    <span>הוסף</span>
                                    <span class="text-xl leading-none">+</span>
                                </button>
                            </div>
                        </div>

                        <div>
                            <div class="flex justify-between items-end mb-3">
                                <label class="font-bold text-slate-700 flex items-center gap-2">
                                    סדר הלימוד המתוכנן
                                </label>
                                <button onclick="clearSequence()"
                                    class="text-sm text-red-500 hover:text-red-700 font-semibold transition-colors flex items-center gap-1">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none"
                                        viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v2m3 3h7" />
                                    </svg>
                                    איפוס רשימה
                                </button>
                            </div>
                            <ul id="sequenceList"
                                class="space-y-2 max-h-56 overflow-y-auto bg-slate-50 p-4 rounded-xl border-2 border-dashed border-slate-300 min-h-[80px]">
                                <!-- Items will be injected here -->
                            </ul>
                        </div>
                    </div>

                    <!-- Left Column: Settings -->
                    <div class="space-y-5">
                        <label class="block font-bold text-slate-700 flex items-center gap-2 mb-1">
                            הגדרות וקצב
                        </label>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="col-span-1">
                                <label class="block text-xs font-bold text-slate-500 mb-1 mr-1">שיטת חישוב</label>
                                <select id="calcMethod"
                                    class="w-full border border-slate-300 rounded-lg p-2.5 bg-white font-medium"
                                    onchange="toggleInputs()">
                                    <option value="pace">קצב דפים קבוע</option>
                                    <option value="targetDate">יעד סיום סופי</option>
                                </select>
                            </div>
                            <div class="col-span-1">
                                <label class="block text-xs font-bold text-slate-500 mb-1 mr-1">הפסקה (ימים)</label>
                                <input type="number" id="breakDaysInput" value="0" min="0"
                                    class="w-full border border-slate-300 rounded-lg p-2.5" placeholder="0">
                            </div>
                        </div>

                        <div id="paceSection" class="bg-blue-50/50 p-3 rounded-lg border border-blue-100">
                            <label class="block text-xs font-bold text-blue-800 mb-1 mr-1">דפים ליום לימוד</label>
                            <input type="number" id="paceInput" value="1" step="0.5" min="0.5"
                                class="w-full border border-blue-200 rounded-lg p-2.5 text-lg font-bold text-blue-900">
                        </div>

                        <div>
                            <label for="targetDateInput">תאריך יעד לסיום:</label>
                            <input type="date" id="targetDateInput" onchange="updateHebrewLabel(this, 'targetDateHebrewLabel')">
                            <span id="targetDateHebrewLabel" style="margin-right: 10px; color: #555;"></span>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label for="startDateInput">תאריך התחלה:</label>
                                <input type="date" id="startDateInput" onchange="updateHebrewLabel(this, 'startDateHebrewLabel')">
                                <span id="startDateHebrewLabel" style="margin-right: 10px; color: #555;"></span>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 mb-1 mr-1">התחלה מדף</label>
                                <div class="flex gap-1">
                                    <input type="text" id="startDafInput" placeholder="דף"
                                        class="w-2/3 border border-slate-300 rounded-lg p-2.5 text-center font-bold">
                                    <select id="startAmudSelect"
                                        class="w-1/3 border border-slate-300 rounded-lg p-2.5 font-bold">
                                        <option value="א">א</option>
                                        <option value="ב">ב</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div
                            class="grid grid-cols-1 sm:grid-cols-2 gap-3 p-4 bg-slate-50 rounded-xl border border-slate-200">
                            <label class="flex items-center gap-3 cursor-pointer group">
                                <div class="relative">
                                    <input type="checkbox" id="includeShabbatInput" class="peer hidden" checked>
                                    <div
                                        class="w-5 h-5 border-2 border-slate-300 rounded peer-checked:bg-blue-800 peer-checked:border-blue-800 transition-all">
                                    </div>
                                    <svg class="absolute top-1 right-1 w-3 h-3 text-white hidden peer-checked:block"
                                        fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="4"
                                            d="M5 13l4 4L19 7" />
                                    </svg>
                                </div>
                                <span class="text-sm font-bold text-slate-600 group-hover:text-slate-900">ימי שבת</span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer group">
                                <div class="relative">
                                    <input type="checkbox" id="includeHolidaysInput" class="peer hidden">
                                    <div
                                        class="w-5 h-5 border-2 border-slate-300 rounded peer-checked:bg-blue-800 peer-checked:border-blue-800 transition-all">
                                    </div>
                                    <svg class="absolute top-1 right-1 w-3 h-3 text-white hidden peer-checked:block"
                                        fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="4"
                                            d="M5 13l4 4L19 7" />
                                    </svg>
                                </div>
                                <span class="text-sm font-bold text-slate-600 group-hover:text-slate-900">חגים
                                    ומועדים</span>
                            </label>
                        </div>

                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1 mr-1">סוג לוח תצוגה</label>
                            <select id="calendarType" class="w-full border border-slate-300 rounded-lg p-2.5 bg-white"
                                onchange="generate()">
                                <option value="hebrew">עברי (ראשי)</option>
                                <option value="gregorian">לועזי (ראשי)</option>
                            </select>
                        </div>
                    </div>
                </div>

                <button onclick="generate()"
                    class="w-full mt-10 bg-slate-900 text-white py-5 rounded-2xl font-black text-xl hover:bg-black transition-all shadow-xl hover:shadow-2xl transform hover:-translate-y-1 active:translate-y-0 flex items-center justify-center gap-3">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    צור לוח לימוד מותאם אישית
                </button>
            </div>
        </div>

        <div id="calendarContainer" class="space-y-12 mb-24"></div>

        <!-- Sticky Action Bar -->
        <div id="printBtn" class="fixed bottom-8 left-1/2 -translate-x-1/2 flex gap-4 hidden no-print z-50">
            <button onclick="window.print()"
                class="bg-white text-slate-800 px-8 py-4 rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.2)] border border-slate-200 font-bold hover:bg-slate-50 transition-all flex items-center gap-3 group">
                <span class="text-xl group-hover:scale-120 transition-transform">🖨️</span>
                <span>הדפסת הלוח</span>
            </button>
            <button onclick="exportToExcel()"
                class="bg-green-600 text-white px-8 py-4 rounded-2xl shadow-[0_20px_50px_rgba(22,163,74,0.3)] font-bold hover:bg-green-700 transition-all flex items-center gap-3 group">
                <span class="text-xl group-hover:rotate-12 transition-transform">📊</span>
                <span>ייצוא לאקסל</span>
            </button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
