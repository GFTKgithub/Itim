<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>עיתים - מתכנן לימוד</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* --- SCREEN STYLES (Your original great look) --- */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            background-color: #e5e7eb;
        }
    
        .calendar-day {
            min-height: 95px;
            background: white;
            padding: 4px;
            display: flex;
            flex-direction: column;
            transition: all 0.2s;
        }
    
        .calendar-day:hover {
            background-color: #f9fafb;
        }
    
        .holiday-bg {
            background-color: #fefce8;
            border: 1px solid #fef08a;
        }
    
        .shabbat-bg {
            background-color: #eff6ff;
        }
    
        .holiday-label-small {
            display: block;
            color: #b91c1c;
            font-size: 10px;
            font-weight: bold;
            margin-bottom: 2px;
        }
    
        .force-study {
            background-color: #f0f7ff !important;
            border: 2px solid #3b82f6 !important;
        }
    
        .force-break {
            background-color: #fef2f2 !important;
            border: 2px solid #ef4444 !important;
        }
    
        /* --- PRINT STYLES (The Centering & Ghost-Page Fix) --- */
        @media print {
            .no-print {
                display: none !important;
            }
    
            /* 1. Reset everything to prevent "leaking" boxes */
            html,
            body {
                margin: 0 !important;
                padding: 0 !important;
                height: auto;
                background: white !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
    
            /* 2. The Month Wrapper */
            .calendar-month {
                page-break-before: always;
                page-break-inside: avoid;
    
                /* Center the calendar */
                display: flex !important;
                flex-direction: column;
                justify-content: center;
                align-items: center;
    
                /* vh can be tricky; 96% of the page is safer */
                min-height: 96vh;
                width: 100%;
    
                /* CRITICAL: Remove these so they don't appear on blank pages */
                border: none !important;
                box-shadow: none !important;
                margin: 0 !important;
            }
    
            .calendar-month:first-child {
                page-break-before: auto;
            }
    
            /* 3. The actual calendar content (put borders here instead) */
            .calendar-month>div {
                width: 95%;
                border: 1px solid #eee;
                /* Light border around the actual table only */
                padding: 10px;
            }
    
            .calendar-day {
                min-height: 80px !important;
            }
        }
    </style>
</head>

<body class="bg-slate-50 font-sans text-gray-900 p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <header class="text-center mb-10 no-print">
            <h1 class="text-4xl font-extrabold text-slate-800 mb-2">עיתים</h1>
            <p class="text-slate-600">תכנון ובניית מסלולי לימוד בהתאמה אישית</p>
        </header>

        <div class="bg-white p-6 rounded-xl shadow-lg mb-8 no-print border-t-8 border-blue-800">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <!-- בחירת מסכת -->
                <div class="space-y-4">
                    <div class="bg-slate-50 p-4 rounded-lg border border-slate-200">
                        <label class="block font-bold mb-2 text-slate-700">הוספת מסכת למסלול:</label>
                        <div class="flex gap-2">
                            <select id="masechetSelect"
                                class="flex-1 border rounded-lg p-2 bg-white shadow-sm"></select>
                            <button onclick="addToSequence()"
                                class="bg-blue-800 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-900 transition">+</button>
                        </div>
                    </div>

                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <label class="font-bold text-slate-700">סדר הלימוד המתוכנן:</label>
                            <button onclick="clearSequence()" class="text-xs text-red-600 hover:underline">איפוס
                                מסלול</button>
                        </div>
                        <ul id="sequenceList"
                            class="space-y-2 max-h-48 overflow-y-auto bg-slate-50 p-3 rounded-lg border border-dashed border-slate-300 min-h-[60px]">
                        </ul>
                    </div>
                </div>

                <!-- הגדרות לוגיקה -->
                <div class="grid grid-cols-1 gap-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-bold mb-1">שיטת חישוב:</label>
                            <select id="calcMethod" class="w-full border rounded p-2 bg-white"
                                onchange="toggleInputs()">
                                <option value="pace">קצב דפים קבוע</option>
                                <option value="targetDate">יעד סיום סופי</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-1">הפסקה בין מסכתות:</label>
                            <input type="number" id="breakDaysInput" value="0" min="0" class="w-full border rounded p-2"
                                placeholder="ימים">
                        </div>
                    </div>

                    <div id="paceSection">
                        <label class="block text-sm font-bold mb-1">דפים ליום:</label>
                        <input type="number" id="paceInput" value="1" step="0.5" min="0.5"
                            class="w-full border rounded p-2">
                    </div>

                    <div id="targetDateSection" class="hidden">
                        <label class="block text-sm font-bold mb-1 text-red-700">תאריך יעד לסיום המסלול:</label>
                        <input type="date" id="targetDateInput" class="w-full border rounded p-2 border-red-200">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-bold mb-1">תאריך התחלה:</label>
                            <input type="date" id="startDateInput" class="w-full border rounded p-2">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-1 text-slate-500 italic">התחלה מדף:</label>
                            <div class="flex gap-1">
                                <input type="text" id="startDafInput" placeholder="דף"
                                    class="w-2/3 border rounded p-2 text-center">
                                <select id="startAmudSelect" class="w-1/3 border rounded p-2">
                                    <option value="א">א</option>
                                    <option value="ב">ב</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="flex flex-col gap-2 p-3 bg-slate-50 rounded-lg border border-slate-200">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" id="IncludeShabbatInput" class="w-4 h-4 text-blue-800" checked>
                            <span class="text-sm font-semibold">כלול ימי שבת כלימוד</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" id="includeHolidaysInput" class="w-4 h-4 text-blue-800">
                            <span class="text-sm font-semibold">כלול חגים כלימוד</span>
                        </label>
                    </div>
                    <div class="col-span-2 grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-bold mb-1">סוג לוח תצוגה:</label>
                            <select id="calendarType" class="w-full border rounded p-2 bg-white" onchange="generate()">
                                <option value="hebrew">עברי (ראשי)</option>
                                <option value="gregorian">לועזי (ראשי)</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <button onclick="generate()"
                class="w-full mt-8 bg-slate-800 text-white py-4 rounded-xl font-bold hover:bg-black transition-all shadow-lg transform hover:-translate-y-1">
                צור לוח לימוד מותאם אישית
            </button>
        </div>

        <div id="calendarContainer" class="space-y-12 mb-12"></div>

        <div id="printBtn" class="fixed bottom-6 left-1/2 -translate-x-1/2 flex gap-4 hidden no-print">
            <button onclick="window.print()"
                class="bg-white text-slate-800 px-8 py-3 rounded-full shadow-2xl border border-slate-200 font-bold hover:bg-slate-50 transition flex items-center gap-2">
                <span>🖨️ הדפסה</span>
            </button>
            <button onclick="exportToExcel()"
                class="bg-green-600 text-white px-8 py-3 rounded-full shadow-2xl font-bold hover:bg-green-700 transition flex items-center gap-2">
                <span>📊 ייצוא לאקסל</span>
            </button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
